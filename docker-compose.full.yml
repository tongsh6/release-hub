version: '3.8'
services:
  postgres:
    image: postgres:18.1
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: releasehub
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  gitlab:
    image: gitlab/gitlab-ce:17.11.3-ce.0
    hostname: gitlab.local
    environment:
      GITLAB_OMNIBUS_CONFIG: |
        external_url 'http://gitlab.local'
        nginx['listen_port'] = 80
        nginx['listen_https'] = false
        prometheus_monitoring['enable'] = false
        puma['worker_processes'] = 2
        sidekiq['max_concurrency'] = 10
        gitlab_rails['initial_root_password'] = 'releasehub123'
        gitlab_rails['display_initial_root_password'] = false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/-/health"]
      interval: 30s
      timeout: 10s
      retries: 20

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: gitlab-e2e

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    ports:
      - "80:80"

  test-runner:
    build:
      context: .
      dockerfile: scripts/e2e/Dockerfile.test-runner
    depends_on:
      gitlab:
        condition: service_healthy
      backend:
        condition: service_started
      frontend:
        condition: service_started
    environment:
      GITLAB_URL: http://gitlab:80
      BACKEND_URL: http://backend:8080
      SPRING_PROFILES_ACTIVE: gitlab-e2e
      FRONTEND_URL: http://frontend:80
    volumes:
      - ./reports:/app/reports
    command: ["bash", "scripts/e2e/run-vertical-slices.sh"]
