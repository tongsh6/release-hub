spring:
  config:
    activate:
      on-profile: e2e
  datasource:
    url: ${E2E_DATASOURCE_URL:jdbc:postgresql://localhost:5433/release_hub}
    username: ${E2E_DATASOURCE_USERNAME:postgres}
    password: ${E2E_DATASOURCE_PASSWORD:123456}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

releasehub:
  seed:
    enabled: true
  gitlab:
    real-adapter: true
    base-url: ${E2E_GITLAB_URL:http://localhost:9080}
  crypto:
    enabled: true
    secret-key: ${E2E_CRYPTO_KEY:cDFpla3K5OH0N7xqJAWKzDfR1mBvLgTcYuVX9wEsH8I=}

security:
  jwt:
    secret: ${E2E_JWT_SECRET:e2e-test-secret-key-32chars-long}
    ttl-minutes: 60

logging:
  level:
    io.releasehub: DEBUG
