# =============================================================================
# ReleaseHub 真实外部依赖模式
#
# 使用方式: spring.profiles.active=local,real
#
# 本 profile 启用所有真实 Git 平台适配器（替代 Mock 实现）：
#   - GitLab 文件读取 （pom.xml / gradle.properties 版本提取）
#   - GitLab 分支/MR 操作 （创建、合并、归档、Pipeline 触发）
#
# 前提条件：
#   1. GitLab 实例已在 UI 设置页面中配置（baseUrl + token）
#   2. 各仓库的 gitToken 已正确配置（支持不同仓库使用不同 token）
#   3. Token 需要 read_repository + api 权限
#
# 无本 profile 时，所有 Git 平台操作使用 Mock 实现：
#   - 文件读取返回模拟数据
#   - 分支操作在内存中模拟
# =============================================================================

releasehub:
  gitlab:
    # 启用真实 GitLab 文件读取适配器（替代 MockGitLabFileAdapter）
    # 版本提取（VersionExtractor）依赖此适配器从仓库读取 pom.xml / gradle.properties
    real-file-adapter: true
    # 启用真实 GitLab 分支操作适配器（GitLabGitBranchAdapter）
    # 不开启时该 Bean 不加载，工厂仅持有 MOCK / GITHUB 适配器
    # 分支创建/合并/归档/标签/Pipeline 触发依赖此适配器
    real-adapter: true
