spring:
  config:
    activate:
      on-profile: gitlab-e2e-local
  datasource:
    url: jdbc:postgresql://localhost:5433/release_hub
    username: postgres
    password: 123456
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

releasehub:
  seed:
    enabled: true
  gitlab:
    real-adapter: true
    base-url: http://localhost:9080

security:
  jwt:
    secret: gitlab-e2e-local-test-secret-key-32chars-long
    ttl-minutes: 60

logging:
  level:
    io.releasehub: DEBUG
