spring:
  config:
    activate:
      on-profile: gitlab-e2e
  datasource:
    url: jdbc:postgresql://postgres:5432/releasehub
    username: postgres
    password: 123456
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

releasehub:
  seed:
    enabled: true
  gitlab:
    real-adapter: true
    base-url: http://gitlab:80

security:
  jwt:
    secret: gitlab-e2e-test-secret-key-32chars-long
