name: Full-Link E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '*.md'
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Start core services (postgres + gitlab + backend + frontend)
        run: docker compose -f docker-compose.full.yml up -d --build postgres gitlab backend frontend

      - name: Wait for backend
        run: |
          for i in $(seq 1 60); do
            if curl -s http://localhost:8081/actuator/health 2>/dev/null | grep -q UP; then
              echo "Backend ready"; exit 0
            fi
            echo "Waiting backend... ($i/60)"; sleep 10
          done
          echo "Timeout waiting for backend"; exit 1

      - name: Wait for GitLab healthy
        run: |
          for i in $(seq 1 60); do
            status=$(docker compose -f docker-compose.full.yml ps gitlab --format json | python3 -c 'import sys,json; print(json.loads(sys.stdin.read())["Health"])' 2>/dev/null || echo "")
            if [ "$status" = "healthy" ]; then echo "GitLab healthy"; exit 0; fi
            echo "GitLab status: $status ($i/60)"; sleep 15
          done
          echo "Timeout waiting for GitLab"; exit 1

      - name: Reset GitLab root password (initial_root_password unreliable on 17.11)
        run: |
          docker compose -f docker-compose.full.yml exec -T gitlab \
            gitlab-rails runner "u=User.find(1); u.password='releasehub123'; u.password_confirmation='releasehub123'; u.password_automatically_set=false; u.save!; puts 'OK'"

      - name: Run vertical slice tests
        run: docker compose -f docker-compose.full.yml run --rm test-runner

      - name: Collect logs
        if: always()
        run: docker compose -f docker-compose.full.yml logs > e2e-logs.txt

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-logs
          path: e2e-logs.txt

      - name: Teardown
        if: always()
        run: docker compose -f docker-compose.full.yml down -v
