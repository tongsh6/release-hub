name: Full-Link E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '*.md'
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Start full stack
        run: docker compose -f docker-compose.full.yml up -d --build

      - name: Wait for services
        run: |
          echo "Waiting for services to be healthy..."
          for i in $(seq 1 60); do
            if curl -s http://localhost:8080/actuator/health 2>/dev/null; then
              echo "Backend is ready"
              exit 0
            fi
            echo "Waiting... ($i/60)"
            sleep 10
          done
          echo "Timeout waiting for backend"
          exit 1

      - name: Run vertical slice tests
        run: docker compose -f docker-compose.full.yml run --rm test-runner

      - name: Collect logs
        if: always()
        run: docker compose -f docker-compose.full.yml logs > e2e-logs.txt

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-logs
          path: e2e-logs.txt

      - name: Teardown
        if: always()
        run: docker compose -f docker-compose.full.yml down -v
